name: Build AppOpt WebUI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'webui/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget cmake
    
    - name: Build libmicrohttpd
      run: |
        cd /tmp
        wget https://ftp.gnu.org/gnu/libmicrohttpd/libmicrohttpd-0.9.77.tar.gz
        tar xzf libmicrohttpd-0.9.77.tar.gz
        cd libmicrohttpd-0.9.77
        export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang
        ./configure --host=aarch64-linux-android --prefix=$PWD/install --disable-shared --enable-static
        make -j$(nproc)
        make install
        echo "MICROHTTPD_PATH=/tmp/libmicrohttpd-0.9.77/install" >> $GITHUB_ENV
    
    - name: Build cJSON
      run: |
        cd /tmp
        git clone https://github.com/DaveGamble/cJSON.git
        cd cJSON
        mkdir build && cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-30 \
              -DBUILD_SHARED_LIBS=OFF \
              ..
        make -j$(nproc)
        echo "CJSON_PATH=/tmp/cJSON/build" >> $GITHUB_ENV
    
    - name: Build WebUI
      run: |
        cd webui
        export NDK_PATH=$ANDROID_NDK_HOME
        make ARCH=arm64 -j$(nproc)
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: AppOptWebUI-arm64
        path: webui/bin/AppOptWebUI
    
    - name: Create release package
      if: github.event_name == 'push'
      run: |
        cd webui/bin
        tar -czf AppOptWebUI-arm64-$(date +%Y%m%d).tar.gz AppOptWebUI
    
    - name: Upload release
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v3
      with:
        name: AppOptWebUI-release
        path: webui/bin/*.tar.gz
